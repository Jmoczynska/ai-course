name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    defaults:
      run:
        working-directory: AI-Assisted Continuous Integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: AI-Assisted Continuous Integration/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: AI-Assisted Continuous Integration/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            AI-Assisted Continuous Integration/test-results/**/trace*.zip
            AI-Assisted Continuous Integration/test-results
          if-no-files-found: ignore

      - name: Notify Microsoft Teams on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH_NAME: ${{ github.head_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "❌ Playwright workflow failed.\nPR: ${PR_TITLE}\nAuthor: ${PR_AUTHOR}\nBranch: ${BRANCH_NAME}\nRun: ${RUN_URL}"
          }
          JSON
          )
          payload="${payload//\$\{PR_TITLE\}/${PR_TITLE}}"
          payload="${payload//\$\{PR_AUTHOR\}/${PR_AUTHOR}}"
          payload="${payload//\$\{BRANCH_NAME\}/${BRANCH_NAME}}"
          payload="${payload//\$\{RUN_URL\}/${RUN_URL}}"
          curl -H "Content-Type: application/json" -d "$payload" "$TEAMS_WEBHOOK_URL"
