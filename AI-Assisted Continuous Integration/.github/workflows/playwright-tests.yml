name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    # Run Playwright E2E tests for pull requests into main.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # Checkout repository code.
      - name: Checkout
        uses: actions/checkout@v4

      # Setup latest LTS Node.js and enable Yarn cache.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies with strict lockfile/cache validation.
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers and required system dependencies.
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run Playwright tests (parallel by default via Playwright workers).
      - name: Run Playwright tests
        run: yarn playwright test

      # Always upload Playwright HTML report for debugging.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: warn

      # Always upload Playwright traces for failed/intermittent test analysis.
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/**/trace*.zip
            test-results
          if-no-files-found: warn

      - name: Notify Microsoft Teams on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH_NAME: ${{ github.head_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "❌ Playwright workflow failed.\nPR: ${PR_TITLE}\nAuthor: ${PR_AUTHOR}\nBranch: ${BRANCH_NAME}\nRun: ${RUN_URL}"
          }
          JSON
          )
          payload="${payload//\$\{PR_TITLE\}/${PR_TITLE}}"
          payload="${payload//\$\{PR_AUTHOR\}/${PR_AUTHOR}}"
          payload="${payload//\$\{BRANCH_NAME\}/${BRANCH_NAME}}"
          payload="${payload//\$\{RUN_URL\}/${RUN_URL}}"
          curl -H "Content-Type: application/json" -d "$payload" "$TEAMS_WEBHOOK_URL"
